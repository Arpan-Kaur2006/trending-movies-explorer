<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trending Movies Explorer</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #111;
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      background-color: #222;
    }

    h1 {
      margin: 0;
    }

    #movies {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .movie-card {
      background-color: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .movie-card:hover {
      transform: scale(1.05);
    }

    .movie-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }

    .movie-info {
      padding: 10px;
    }

    .rating {
      color: #f5c518;
      font-weight: bold;
    }

    #loading {
      text-align: center;
      padding: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <header>
    <h1>🎬 Trending Movies</h1>
  </header>

  <!-- Loading -->
  <div id="loading">Loading movies...</div>

  <!-- Movies Container -->
  <div id="movies"></div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
